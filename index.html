<!DOCTYPE html>
<html lang="en-GB">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Nomad is a pioneering closed-loop neurotechnology wearable. Non-invasively interfaces with the autonomic nervous system for real-time body-state optimization. Preparing for first-in-human investigation.">
  <meta name="theme-color" content="#F5F3ED">
  <title>Nomad Neuroscience | The Operating System for Your Body</title>

  <!-- Social SEO -->
  <meta property="og:title" content="Nomad Neuroscience | The Operating System for Your Body">
  <meta property="og:description"
    content="Pioneering closed-loop neurotechnology. Non-invasively interfacing with the autonomic nervous system for real-time body-state optimization.">
  <meta property="og:image" content="https://nomadneuro.com/assets/images/hero.png">
  <meta property="og:url" content="https://nomadneuro.com/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Nomad Neuroscience | The Operating System for Your Body">
  <meta name="twitter:description" content="Pioneering closed-loop neurotechnology for the autonomic nervous system.">
  <meta name="twitter:image" content="https://nomadneuro.com/assets/images/hero.png">

  <!-- Technical SEO -->
  <link rel="canonical" href="https://nomadneuro.com/" />
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebPage",
          "@id": "https://nomadneuro.com/#webpage",
          "url": "https://nomadneuro.com/",
          "name": "Nomad Neuroscience | The Operating System for Your Body",
          "description": "The first closed-loop wearable designed to read and respond to signals from the autonomic nervous system.",
          "publisher": { "@id": "https://nomadneuro.com/#organization" }
        },
        {
          "@type": "Organization",
          "@id": "https://nomadneuro.com/#organization",
          "name": "Nomad Neuroscience Ltd",
          "url": "https://nomadneuro.com/",
          "logo": "https://nomadneuro.com/favicon.svg",
          "founder": [
            { "@type": "Person", "name": "Santiago Denari", "jobTitle": "Chief Executive Officer" },
            { "@type": "Person", "name": "Oliver Case", "jobTitle": "Chief Science Officer" }
          ],
          "member": [
            { "@type": "Person", "name": "Prof. Imanuel Lerman", "jobTitle": "Clinical Team Lead" },
            { "@type": "Person", "name": "Prof. Steve Alty", "jobTitle": "Engineering Advisor" }
          ]
        }
      ]
    }
    </script>

  <meta name="referrer" content="strict-origin-when-cross-origin">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=3">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <link rel="preload" as="image" href="/assets/images/hero.png" fetchpriority="high">
  <link rel="prefetch" as="image" href="/assets/images/button_back.png">
  <link rel="prefetch" as="image" href="/assets/images/button_back_2.png">
  <link rel="prefetch" as="image" href="/assets/images/button_back_3.png">

  <!-- Fonts -->
  <!-- IBM Plex Sans + Newsreader are self-hosted via @fontsource (see src/index.css). -->
</head>

<body>
  <!-- Hidden form for Netlify to detect during build -->
  <form name="waitlist" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="waitlist" />
    <input type="text" name="bot-field" />
    <input type="text" name="fullName" />
    <input type="email" name="email" />
    <select name="userType">
      <option value="patient">Patient</option>
      <option value="clinician">Clinician or Researcher</option>
      <option value="investor">Potential Investor</option>
      <option value="government">Government / Health System</option>
    </select>
  </form>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
